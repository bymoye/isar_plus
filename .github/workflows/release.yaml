name: Isar Plus release

on:
  push:
    tags:
      - "*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to release"
        required: true
        type: string

jobs:
  release_context:
    name: Release context
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.context.outputs.tag }}
      ref: ${{ steps.context.outputs.ref }}
    steps:
      - name: Resolve release tag
        id: context
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${{ github.ref_name }}"
          fi

          if [[ -z "${TAG}" ]]; then
            echo "Release tag is required"
            exit 1
          fi

          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"
          echo "ref=refs/tags/${TAG}" >> "${GITHUB_OUTPUT}"

  build_binaries:
    name: "Build: ${{ matrix.name }}"
    needs: release_context
    strategy:
      fail-fast: false
      max-parallel: 8
      matrix:
        include:
          - name: "Android ARM64"
            os: ubuntu-latest
            artifact_name: libisar_android_arm64.so
            script: build_android.sh
            upload_path: libisar_android_arm64.so
          - name: "Android ARMv7"
            os: ubuntu-latest
            artifact_name: libisar_android_armv7.so
            script: build_android.sh armv7
            upload_path: libisar_android_armv7.so
          - name: "Android x64"
            os: ubuntu-latest
            artifact_name: libisar_android_x64.so
            script: build_android.sh x64
            upload_path: libisar_android_x64.so
          - name: "Darwin XCFramework"
            os: macos-latest
            artifact_name: IsarPlusCore.xcframework.zip
            script: build_darwin.sh
            upload_path: |
              IsarPlusCore.xcframework.zip
              IsarPlusCore.xcframework.zip.sha256
          - name: "Linux x64"
            os: ubuntu-latest
            artifact_name: libisar_linux_x64.so
            script: build_linux.sh x64
            upload_path: libisar_linux_x64.so
          - name: "Windows x64"
            os: windows-latest
            artifact_name: isar_windows_x64.dll
            script: build_windows.sh x64
            upload_path: isar_windows_x64.dll
          - name: "WebAssembly"
            os: ubuntu-latest
            artifact_name: wasm_files
            script: build_wasm.sh
            upload_path: |
              isar.wasm
              isar.js
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.release_context.outputs.ref }}
      - name: Prepare Build
        uses: ./.github/actions/prepare-build
      - name: Set Isar Version
        shell: bash
        run: echo "ISAR_VERSION=${{ needs.release_context.outputs.tag }}" >> $GITHUB_ENV
      - name: Build binary
        run: bash tool/${{ matrix.script }}
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.upload_path }}
          retention-days: 1

  publish:
    name: Publish
    needs:
      - release_context
      - build_binaries
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ needs.release_context.outputs.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: subosito/flutter-action@v2
      - name: Enable Swift Package Manager
        run: flutter config --enable-swift-package-manager
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          registry-url: 'https://registry.npmjs.org'
      - name: Set Isar Version
        run: echo "ISAR_VERSION=${{ needs.release_context.outputs.tag }}" >> $GITHUB_ENV

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: ./artifacts

      - name: Move artifacts to root
        run: |
          echo "Artifact directory structure:"
          find ./artifacts -type f

          for artifact_dir in ./artifacts/*/; do
            if [ -d "$artifact_dir" ]; then
              echo "Processing directory: $artifact_dir"
              find "$artifact_dir" -maxdepth 1 -type f -exec mv {} ./ \;
            fi
          done

          echo "Files in root directory:"
          ls -la *.so *.dll *.wasm *.js *.zip 2>/dev/null || echo "No binary files found in root"

      - name: Create latest release
        run: |
          if [[ "${{ needs.release_context.outputs.tag }}" == *"dev"* ]] || [[ "${{ needs.release_context.outputs.tag }}" == *"beta"* ]] || [[ "${{ needs.release_context.outputs.tag }}" == *"alpha"* ]]; then
            PRERELEASE_FLAG="--prerelease"
          else
            PRERELEASE_FLAG="--latest"
          fi

          gh release create ${{ needs.release_context.outputs.tag }} \
            libisar_android_arm64.so \
            libisar_android_armv7.so \
            libisar_android_x64.so \
            IsarPlusCore.xcframework.zip \
            libisar_linux_x64.so \
            isar_windows_x64.dll \
            isar.wasm \
            isar.js \
            --title "Isar Plus ${{ needs.release_context.outputs.tag }}" \
            --generate-notes \
            $PRERELEASE_FLAG
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download Binaries (for pub.dev)
        run: sh tool/download_binaries.sh

      - name: Adjust Version
        run: |
          VERSION="${{ needs.release_context.outputs.tag }}"
          VERSION="${VERSION#v}"
          find . -type f -exec sed -i "s/0.0.0-placeholder/${VERSION}/g" {} +

      - name: Update Package.swift checksum and URL
        run: |
          CHECKSUM=$(cat IsarPlusCore.xcframework.zip.sha256)
          RELEASE_URL="https://github.com/${{ github.repository }}/releases/download/${{ needs.release_context.outputs.tag }}/IsarPlusCore.xcframework.zip"
          sed -i \
            -e "s|url: \".*IsarPlusCore.xcframework.zip\"|url: \"${RELEASE_URL}\"|" \
            -e "s|checksum: \".*\"|checksum: \"${CHECKSUM}\"|" \
            packages/isar_plus_flutter_libs/darwin/isar_plus_flutter_libs/Package.swift

      - name: Update npm
        run: npm install -g npm@latest

      - name: Publish to npm
        run: |
          if [[ "${{ needs.release_context.outputs.tag }}" == *"dev"* ]] || [[ "${{ needs.release_context.outputs.tag }}" == *"beta"* ]] || [[ "${{ needs.release_context.outputs.tag }}" == *"alpha"* ]]; then
            TAG_FLAG="--tag dev"
          else
            TAG_FLAG=""
          fi
          npm publish --provenance $TAG_FLAG

      - name: pub.dev credentials
        run: |
          mkdir -p $HOME/.config/dart
          echo '${{ secrets.PUB_JSON }}' >> $HOME/.config/dart/pub-credentials.json

      - name: Publish isar
        run: |
          dart pub get
          dart pub publish --force
        working-directory: packages/isar_plus

      - name: Publish isar_plus_flutter_libs
        run: |
          flutter pub get
          flutter pub publish --force
        working-directory: packages/isar_plus_flutter_libs

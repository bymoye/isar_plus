name: PR Agent

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
      - review_requested
  issue_comment:
    types:
      - created

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  pr_agent:
    name: Review pull request
    runs-on: ubuntu-latest
    if: >-
      github.event.sender.type != 'Bot' &&
      (
        github.event_name != 'issue_comment' ||
        (
          github.event.issue.pull_request &&
          (
            github.event.comment.author_association == 'OWNER' ||
            github.event.comment.author_association == 'MEMBER' ||
            github.event.comment.author_association == 'COLLABORATOR'
          ) &&
          (
            startsWith(github.event.comment.body, '/review') ||
            startsWith(github.event.comment.body, '/describe') ||
            startsWith(github.event.comment.body, '/improve') ||
            startsWith(github.event.comment.body, '/ask') ||
            startsWith(github.event.comment.body, '/help')
          )
        )
      )
    steps:
      - name: Validate PR-Agent secrets
        run: |
          if [ -z "${PR_AGENT_MODEL}" ]; then
            echo "PR_AGENT_MODEL secret is required. Example: gemini/gemini-2.5-flash-lite"
            exit 1
          fi
          if [ -n "${PR_AGENT_MODEL_MAX_TOKENS}" ] && ! echo "${PR_AGENT_MODEL_MAX_TOKENS}" | grep -Eq '^[1-9][0-9]*$'; then
            echo "PR_AGENT_MODEL_MAX_TOKENS must be a positive integer."
            exit 1
          fi
        env:
          PR_AGENT_MODEL: ${{ secrets.PR_AGENT_MODEL }}
          PR_AGENT_MODEL_MAX_TOKENS: ${{ secrets.PR_AGENT_MODEL_MAX_TOKENS }}

      - name: Run PR-Agent
        uses: the-pr-agent/pr-agent@main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GOOGLE_AI_STUDIO.GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          config.model: ${{ secrets.PR_AGENT_MODEL }}
          config.fallback_models: '["${{ secrets.PR_AGENT_MODEL }}"]'
          config.custom_model_max_tokens: ${{ secrets.PR_AGENT_MODEL_MAX_TOKENS || '1048576' }}
          config.enable_custom_labels: "true"
          config.verbosity_level: "2"
          github_action_config.auto_review: "true"
          github_action_config.auto_describe: "true"
          github_action_config.auto_improve: "false"
          github_action_config.pr_actions: '["opened", "reopened", "ready_for_review", "review_requested", "synchronize"]'
          pr_reviewer.persistent_comment: "true"
          pr_reviewer.require_tests_review: "true"
          pr_reviewer.require_security_review: "true"
          pr_reviewer.require_estimate_effort_to_review: "false"
          pr_reviewer.enable_review_labels_effort: "false"
          pr_reviewer.enable_review_labels_security: "false"
          pr_reviewer.num_max_findings: "8"
          pr_reviewer.extra_instructions: |
            Use a professional, concise review style. Do not use emojis anywhere.

            Use this exact structure:

            ## Review Findings

            If there are no concrete findings, write:
            No blocking issues found.

            For each finding, use:
            ### [Severity] Short Finding Title
            - Location: `path/to/file.ext:line`
            - Issue: Explain the concrete problem.
            - Impact: Explain the practical risk.
            - Recommendation: Suggest the smallest clear fix.

            ## Test Coverage

            Summarize missing or relevant tests in one or two bullets. If no test gap is visible, write:
            No obvious test gap from the diff.

            ## Release Risk

            Briefly state whether the change affects public API, data compatibility, release automation, changelog, tags, publishing, or CI.

            Focus on correctness, data safety, platform-specific behavior, release impact, and missing tests.
            Do not add or suggest review metadata labels such as review effort, security review labels, or estimated effort labels.
            Do not include score, effort estimate, generic summary, walkthrough, or promotional text.
            Keep comments actionable and avoid repeating the PR summary.
          pr_description.publish_labels: "true"
          pr_description.generate_ai_title: "false"
          pr_description.use_description_markers: "true"
          pr_description.enable_semantic_files_types: "true"
          pr_description.collapsible_file_list: "adaptive"
          pr_description.extra_instructions: "Use only the repository labels configured as custom labels. Do not add release:* labels; release labels are reserved for maintainers. Do not use emojis anywhere."
